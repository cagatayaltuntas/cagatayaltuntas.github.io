---
layout: default
title: Blog
---

<!-- Sayfa Başlığı -->
    <header class="mb-20 border-b border-slate-200 pb-10">
        <h1 class="text-5xl md:text-6xl font-extrabold text-[#000d22] tracking-tighter mb-6">Academic Blog</h1>
        <p class="text-xl text-slate-500 leading-relaxed max-w-2xl font-medium">
            Thoughts on number theory, teaching mathematics, and academic life.
        </p>
    </header>

    <!-- Blog Yazıları Listesi -->
    <div class="space-y-16">
        
        {% for post in site.posts %}
        <!-- Blog Post -->
        <article class="group relative flex flex-col gap-4 {% unless forloop.first %}pt-16 border-t border-slate-100{% endunless %}">
            <div class="flex items-center gap-4 text-xs font-bold uppercase tracking-[0.2em] text-[#000d22]">
                <span>{{ post.date | date: "%B %Y" }}</span>
                <span class="w-8 h-[1px] bg-slate-200"></span>
                <span class="text-slate-400">{{ post.categories | join: ", " }}</span>
            </div>
            <div class="space-y-4">
                <h2 class="text-3xl md:text-4xl font-extrabold text-[#000d22] group-hover:opacity-80 transition-colors leading-tight">
                    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
                </h2>
                <div class="text-lg text-slate-600 leading-relaxed font-medium">
                    {{ post.excerpt }}
                </div>
                <a href="{{ post.url | relative_url }}" class="inline-flex items-center gap-2 text-sm font-black uppercase tracking-widest text-[#000d22] group-hover:gap-4 transition-all">
                    Read Post <span class="material-symbols-outlined">north_east</span>
                </a>
            </div>
        </article>
        {% endfor %}

    </div>
